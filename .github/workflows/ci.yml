name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `lint` is optional until the ESLint setup lands (#41 / PR #55).
      # `--if-present` runs it when the script exists and no-ops otherwise,
      # so this job stays green on build alone in the meantime.
      - run: npm run lint --if-present

      - run: npm run build
