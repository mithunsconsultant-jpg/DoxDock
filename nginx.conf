server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hardening (the app also ships a strict CSP via a <meta> tag in index.html).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    # Static, content-hashed assets can be cached hard. Missing ones 404 (they
    # do NOT fall through to index.html, so broken asset URLs are obvious).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|ico|svg|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML shell or the service worker.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /sw.js      { add_header Cache-Control "no-cache"; }

    # App uses hash routing, so navigations resolve to index.html; direct file
    # hits (e.g. /ideology.html) are served as-is.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
